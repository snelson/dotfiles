# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Act like vim
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

# Send prefix (for nested tmux)
bind-key a send-prefix

# Act like GNU screen
unbind C-b
set -g prefix C-a

# Quick pane cycling
unbind ^A
bind ^A select-pane -t :.+

# Splits that keep the current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Smart pane switching with awareness of vim/neovim splits
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# Reload config
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Mouse support (click panes, scroll, resize)
set -g mouse on

# Increase scrollback buffer
set -g history-limit 10000

# Faster escape time (for neovim)
set -sg escape-time 10

# Focus events (for neovim autoread)
set -g focus-events on

# Solarized-flavored UI colors
# Accent is Solarized cyan/teal (#2aa198); swap it for blue #268bd2,
# yellow #b58900, or green #859900 to taste.
set -g status-style "bg=#2aa198,fg=#002b36"                       # teal bar, dark text
set -g window-status-current-style "fg=#002b36,bg=#2aa198,bold"   # active window: bold + * flag
set -g window-status-style "fg=#073642,bg=#2aa198"                # inactive windows: dimmer text
set -g pane-border-style "fg=#586e75"                             # inactive pane border: base01
set -g pane-active-border-style "fg=#2aa198"                      # active pane border: cyan/teal
set -g message-style "bg=#2aa198,fg=#002b36"                      # command / message bar
